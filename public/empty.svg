<svg width="200" height="200" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="orbitGrad1" x1="0" y1="0" x2="200" y2="200" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0891b2" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#10b981" stop-opacity="0.4"/>
    </linearGradient>
    <linearGradient id="orbitGrad2" x1="200" y1="0" x2="0" y2="200" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#06b6d4" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#0891b2" stop-opacity="0.3"/>
    </linearGradient>
    <linearGradient id="orbitGrad3" x1="100" y1="0" x2="100" y2="200" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#10b981" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#06b6d4" stop-opacity="0.3"/>
    </linearGradient>
  </defs>

  <!-- Outer orbit (tilted ellipse) -->
  <ellipse cx="100" cy="100" rx="88" ry="40" transform="rotate(-20 100 100)" stroke="url(#orbitGrad1)" stroke-width="1.5" stroke-dasharray="8 6" fill="none"/>

  <!-- Middle orbit -->
  <ellipse cx="100" cy="100" rx="70" ry="32" transform="rotate(15 100 100)" stroke="url(#orbitGrad2)" stroke-width="1.5" stroke-dasharray="6 5" fill="none"/>

  <!-- Inner orbit -->
  <ellipse cx="100" cy="100" rx="48" ry="22" transform="rotate(-40 100 100)" stroke="url(#orbitGrad3)" stroke-width="1.5" stroke-dasharray="5 4" fill="none"/>

  <!-- Center orb -->
  <circle cx="100" cy="100" r="6" fill="#06b6d4" opacity="0.5"/>
  <circle cx="100" cy="100" r="3" fill="#67e8f9" opacity="0.7"/>

  <!-- Dots on outer orbit -->
  <circle cx="36" cy="72" r="3" fill="#0891b2" opacity="0.8"/>
  <circle cx="170" cy="120" r="2.5" fill="#10b981" opacity="0.75"/>

  <!-- Dots on middle orbit -->
  <circle cx="52" cy="122" r="2.5" fill="#06b6d4" opacity="0.8"/>
  <circle cx="155" cy="80" r="2" fill="#0891b2" opacity="0.7"/>

  <!-- Dots on inner orbit -->
  <circle cx="72" cy="88" r="2" fill="#10b981" opacity="0.75"/>
  <circle cx="132" cy="108" r="2.5" fill="#06b6d4" opacity="0.7"/>

  <!-- Small sparkle dots -->
  <circle cx="100" cy="58" r="1.5" fill="#67e8f9" opacity="0.6"/>
  <circle cx="140" cy="140" r="1.5" fill="#10b981" opacity="0.55"/>
  <circle cx="60" cy="145" r="1" fill="#0891b2" opacity="0.5"/>
</svg>
